version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown: # applies only to version-updates (security-updates will be suggested immediately)
      default-days: 10
      semver-minor-days: 14 # wait 14 days before applying minor updates
      semver-major-days: 28
  - package-ecosystem: docker
    directory: crates/weave-github
    schedule:
      interval: weekly
    cooldown:
      default-days: 10
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 10
  - package-ecosystem: npm
    directory: site
    schedule:
      interval: weekly
    cooldown:
      default-days: 10
      semver-minor-days: 14
      semver-major-days: 28
